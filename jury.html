<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SANTEO Connect – Jury 2025</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #26C6DA 0%, #00838F 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .logo-wrap {
      margin-bottom: 20px;
    }
    .logo-wrap img {
      max-width: 220px;
      height: auto;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #00838F;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 14px;
      color: #607D8B;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .btn-open {
      display: inline-block;
      background: linear-gradient(135deg, #26C6DA, #00838F);
      color: white;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 32px;
      transition: transform .2s;
    }
    .btn-open:hover { transform: scale(1.04); }
    .features {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; margin-bottom: 30px;
    }
    .feature {
      background: #E0F7FA;
      color: #00838F;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .qr-section { margin-bottom: 24px; }
    .qr-section img { width: 200px; height: 200px; }
    .url {
      font-size: 11px;
      color: #90A4AE;
      word-break: break-all;
      margin-top: 8px;
    }
    .territories {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .territory {
      background: #00838F;
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    footer {
      font-size: 12px;
      color: #B0BEC5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="icons/santeo_icon_1024.png" alt="SANTEO Connect Logo">
    </div>
    <h1>SANTEO Connect</h1>
    <p class="tagline">La santé digitale qui connecte<br>le Pacifique au monde</p>

    <a class="btn-open" href="https://5060-iac8s2rvzep9b8i8bsh0c-ad490db5.sandbox.novita.ai/#/landing" target="_blank">
      Ouvrir l'application
    </a>

    <div class="features">
      <span class="feature">🤖 IA Santé</span>
      <span class="feature">🏋️ Exercices</span>
      <span class="feature">📊 Suivi</span>
      <span class="feature">💬 Chat</span>
    </div>

    <div class="qr-section">
      <p style="font-size:13px;color:#607D8B;margin-bottom:12px;font-weight:600;">Scanner pour accéder à l'app</p>
      <img src="qr_code_santeo_logo.png" alt="QR Code SANTEO">
      <p class="url">https://5060-iac8s2rvzep9b8i8bsh0c-ad490db5.sandbox.novita.ai</p>
    </div>

    <div class="territories">
      <span class="territory">🇳🇨 NC</span>
      <span class="territory">🇵🇫 PF</span>
      <span class="territory">🇼🇫 WF</span>
      <span class="territory">🇻🇺 Vanuatu</span>
    </div>

    <footer>Présenté au jury – 2025</footer>
  </div>
</body>
</html>
