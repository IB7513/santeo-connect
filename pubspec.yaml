name: santeo_connect
description: SANTEO Connect - La santé digitale du Pacifique avec IA OpenAI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: 6.1.5+1

  # HTTP & API
  http: 1.5.0

  # Local Storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # UI Components
  fl_chart: 0.68.0
  table_calendar: 3.1.3
  smooth_page_indicator: 1.2.0+3
  percent_indicator: 4.2.3
  google_fonts: 6.2.1

  # Utils
  intl: 0.19.0
  url_launcher: 6.3.1
  uuid: 4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
